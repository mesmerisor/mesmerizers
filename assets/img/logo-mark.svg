<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Mesmerizers">
  <defs>
    <linearGradient id="mzBlue" x1="6" y1="58" x2="50" y2="6" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1d4ed8"/>
      <stop offset=".55" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="mzGrey" x1="52" y1="8" x2="24" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#cbd3dd"/>
      <stop offset="1" stop-color="#6b7682"/>
    </linearGradient>
    <linearGradient id="mzGreyDark" x1="48" y1="10" x2="30" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9aa4b0"/>
      <stop offset="1" stop-color="#4b535c"/>
    </linearGradient>
  </defs>

  <!-- grey sail block -->
  <path d="M30 12 L53 7 L53 53 L30 53 Z" fill="url(#mzGrey)"/>
  <!-- inner darker facet for depth -->
  <path d="M30 12 L53 7 L30 53 Z" fill="url(#mzGreyDark)" opacity=".75"/>

  <!-- blue swoosh / sail catching wind -->
  <path d="M33 6
           C 14 16, 9 36, 19 56
           C 16 38, 23 22, 39 16
           C 35 12, 33 9, 33 6 Z" fill="url(#mzBlue)"/>

  <!-- trailing speed lines -->
  <path d="M7 54 H27" stroke="url(#mzGrey)" stroke-width="2.4" stroke-linecap="round"/>
  <path d="M11 49.5 H24" stroke="url(#mzGrey)" stroke-width="2.2" stroke-linecap="round" opacity=".75"/>
  <path d="M15 45 H21" stroke="url(#mzGrey)" stroke-width="2" stroke-linecap="round" opacity=".5"/>

  <!-- orange accent tip (brand tie-in) -->
  <path d="M33 6 C 33 9, 35 12, 39 16 L34.5 12.5 C 33.6 10.2, 33.1 8.1, 33 6 Z" fill="#f97316"/>
</svg>
